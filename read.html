<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📝방명록 조회</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="terminal-container">
        <div class="status-bar">
            <p>방명록 전체 목록 조회 (최신 순 정렬)</p>
        </div>

        <div class="main-content-area">
            <table class="guestbook-table">
                <thead>
                    <tr>
                        <th class="col-num">번호</th>
                        <th class="col-title">제목</th> <th class="col-name">작성자</th>
                        <th class="col-text">내용</th>
                        <th class="col-date">작성일</th>
                    </tr>
                </thead>
                <tbody id="guestbook-list">
                </tbody>
            </table>

            <div class="action-bar">
                <p>[H] 홈으로 이동 | [W] 방명록 쓰기 | [D] 게시글 삭제</p>
            </div>
        </div>

        <div class="command-line">
            <span>명령어를 입력하세요 (H/W/D) : </span>
            <input type="text" id="read-input" class="terminal-input" autofocus autocomplete="off" style="width: 150px;">
        </div>
    </div>
    <script src="api.js"></script>
    <script src="main.js"></script>
</body>
</html>
